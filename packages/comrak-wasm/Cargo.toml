[package]
name = "comrak-wasm"
version = "0.1.1"
edition = "2021"
license = "MIT"
description = "WebAssembly bindings for comrak — a fast CommonMark + GFM Markdown parser and renderer"
repository = "https://github.com/jveres/typefm"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
comrak = { version = "0.51", default-features = false, features = ["shortcodes", "phoenix_heex"] }
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
lol_alloc = "0.4"

