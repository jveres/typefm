# @typefm/comrak-wasm playground

Renders markdown using **comrak** 0.51 compiled to WebAssembly — supporting
*seven output formats* from a single parse.

## Output Formats

| **Format**   | **Target** |       **Use Case** |
| :----------- | :--------: | -----------------: |
| HTML         |  Browser   |     Rich rendering |
| CommonMark   |  Markdown  |    Normalization   |
| XML          |  Tooling   |     AST inspection |
| Typst        |  Print     |     Typesetting    |
| Text         |  Terminal  |   Plain extraction |
| ANSI         |  Terminal  |     Styled output  |

Tables support *inline formatting*:

| **Feature** | **Syntax** | **Example** |
|-------------|------------|-------------|
| Bold | `**text**` | **bold text** |
| Italic | `*text*` | *italic text* |
| Code | `` `code` `` | `inline code` |
| Strike | `~~text~~` | ~~struck~~ |
| Link | `[t](url)` | [docs](https://docs.rs) |

## Code Examples

```typescript
import init, { mdToHtml, mdToAnsi } from "@typefm/comrak-wasm";

await init();

// Render to HTML with GFM extensions
const html = mdToHtml(markdown, {
  extension: { table: true, tasklist: true, alerts: true },
  render: { unsafe: true },
});

// Render to ANSI with custom theme
const ansi = mdToAnsi(markdown, opts, { showMarkdown: false });
```

```rust
fn main() {
    let options = Options::default();
    let html = markdown_to_html("# Hello", &options);
    println!("{html}");
}
```

## Inline Formatting

Regular text with **bold**, *italic*, ~~strikethrough~~, and `inline code`.
Combine them: ***bold italic***, **bold with `code` inside**.
Also: H~2~O (subscript), x^2^ (superscript), ==highlighted==,
++inserted++, ||spoiler text||, and __underlined__.

## Alerts

> [!NOTE]

> [!CAUTION]
> Disabling `showMarkdown` strips all structural markers from the output.
